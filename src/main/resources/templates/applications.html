<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Applications</title>

    <meta charset="UTF-8">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>
        body{
            background:#f5f7fb;
        }
    </style>

</head>

<body>

<div class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <h2>Applications List</h2>

        <div>

            <a href="/applications/add"
               class="btn btn-success me-2">
                Add Application
            </a>

            <a href="/admin-dashboard"
               class="btn btn-dark">
                Dashboard
            </a>

        </div>

    </div>

    <div class="card shadow">

        <div class="card-body">

            <table class="table table-hover">

                <thead class="table-dark">

                <tr>
                    <th>ID</th>
                    <th>Student ID</th>
                    <th>Job ID</th>
                    <th>Status</th>
                    <th>Resume</th>
                    <th>Update Status</th>
                    <th>Delete</th>
                </tr>

                </thead>

                <tbody>

                <tr th:each="app : ${applications}">

                    <td th:text="${app.id}"></td>

                    <td th:text="${app.studentId}"></td>

                    <td th:text="${app.jobId}"></td>

                    <td th:text="${app.status}"></td>

                    <!-- Resume Column -->
                    <td>

                        <a th:if="${app.resumeUrl != null}"
                           th:href="@{'/applications/resume/' + ${#strings.substring(app.resumeUrl, app.resumeUrl.lastIndexOf('/') + 1)}}"
                           target="_blank"
                           class="btn btn-primary btn-sm">

                            View Resume

                        </a>

                        <span th:if="${app.resumeUrl == null}">
                            No Resume
                        </span>

                    </td>

                    <!-- Update Status -->
                    <td>

                        <form action="/applications/update-status"
                              method="post"
                              class="d-flex">

                            <input type="hidden"
                                   name="id"
                                   th:value="${app.id}">

                            <select name="status" class="form-select me-2">

                                <option value="APPLIED"
                                        th:selected="${app.status == 'APPLIED'}">
                                    APPLIED
                                </option>

                                <option value="SHORTLISTED"
                                        th:selected="${app.status == 'SHORTLISTED'}">
                                    SHORTLISTED
                                </option>

                                <option value="SELECTED"
                                        th:selected="${app.status == 'SELECTED'}">
                                    SELECTED
                                </option>

                                <option value="REJECTED"
                                        th:selected="${app.status == 'REJECTED'}">
                                    REJECTED
                                </option>

                            </select>

                            <button type="submit"
                                    class="btn btn-primary btn-sm">
                                Update
                            </button>

                        </form>

                    </td>

                    <!-- Delete -->
                    <td>

                        <a th:href="@{'/applications/delete/' + ${app.id}}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('Delete this application?')">

                            Delete

                        </a>

                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>
</html>
