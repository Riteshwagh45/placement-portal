<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Apply With Resume</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-body">

            <h2 class="mb-4">

                Apply For:
                <span th:text="${job.title}"></span>

            </h2>

            <form th:action="@{/manual-apply}"
                  th:object="${application}"
                  method="post"
                  enctype="multipart/form-data">

                <input type="hidden"
                       th:field="*{jobId}">

                <div class="mb-3">

                    <label class="form-label">
                        Name
                    </label>

                    <input type="text"
                           class="form-control"
                           th:value="${student.name}"
                           readonly>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Email
                    </label>

                    <input type="text"
                           class="form-control"
                           th:value="${student.email}"
                           readonly>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Resume URL
                    </label>

                    <input type="text"
                           th:field="*{resumeUrl}"
                           class="form-control"
                           placeholder="Paste Resume Link">

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Upload Resume (PDF)
                    </label>

                    <input type="file"
                           name="resumeFile"
                           class="form-control"
                           accept=".pdf">

                    <small class="text-muted">
                        Upload your latest resume in PDF format
                    </small>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Cover Letter
                    </label>

                    <textarea th:field="*{coverLetter}"
                              class="form-control"
                              rows="6"
                              placeholder="Write why you are suitable for this job"></textarea>

                </div>

                <button type="submit"
                        class="btn btn-primary">

                    Submit Application

                </button>

                <a href="/student-jobs"
                   class="btn btn-secondary">

                    Cancel

                </a>

            </form>

        </div>

    </div>

</div>

</body>

</html>
