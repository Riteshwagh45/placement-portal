<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Company</title>

    <meta charset="UTF-8">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-8">

            <div class="card shadow">

                <div class="card-body">

                    <h2 class="mb-4">Edit Company</h2>

                    <form th:action="@{/companies/update}"
                          th:object="${company}"
                          method="post">

                        <input type="hidden"
                               th:field="*{id}">

                        <div class="mb-3">
                            <label>Company Name</label>
                            <input type="text"
                                   class="form-control"
                                   th:field="*{companyName}">
                        </div>

                        <div class="mb-3">
                            <label>Location</label>
                            <input type="text"
                                   class="form-control"
                                   th:field="*{location}">
                        </div>

                        <div class="mb-3">
                            <label>Description</label>
                            <textarea class="form-control"
                                      th:field="*{description}">
                            </textarea>
                        </div>

                        <button type="submit"
                                class="btn btn-primary">
                            Update Company
                        </button>

                        <a href="/companies"
                           class="btn btn-secondary">
                            Cancel
                        </a>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
