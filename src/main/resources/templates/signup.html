<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Placement Portal Signup</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        *{
            font-family:'Poppins',sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#f5f7fb;
            padding:20px;
        }

        .signup-card{
            width:100%;
            max-width:500px;
            border:none;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,0.1);
        }

        .card-body{
            padding:35px;
        }

        .title{
            font-weight:700;
            text-align:center;
            margin-bottom:25px;
            color:#0f172a;
        }

        .form-control,
        .form-select{
            height:50px;
            border-radius:10px;
        }

        textarea.form-control {
            height: auto;
        }

        .btn-signup{
            height:50px;
            border-radius:10px;
            font-weight:600;
        }

        @media(max-width:576px){
            .card-body{
                padding:25px;
            }
            .title{
                font-size:26px;
            }
        }
    </style>
</head>

<body>

<div class="card signup-card">
    <div class="card-body">
        <h2 class="title">
            Placement Portal Signup
        </h2>

        <form th:action="@{/signup}" th:object="${user}" method="post">

            <div class="mb-3">
                <label class="form-label fw-semibold">
                    Username
                </label>
                <input type="text" class="form-control" th:field="*{username}" required>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">
                    Email
                </label>
                <input type="email" class="form-control" th:field="*{email}" required>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">
                    Password
                </label>
                <input type="password" class="form-control" th:field="*{password}" required>
            </div>

            <div class="mb-4">
                <label class="form-label fw-semibold">
                    Role
                </label>
                <select id="roleSelect" class="form-select" th:field="*{role}" onchange="toggleCompanyFields()" required>
                    <option value="">Select Role</option>
                    <option value="STUDENT">Student</option>
                    <option value="COMPANY">Company</option>
                </select>
            </div>

            <div id="companyFields" style="display: none;">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Company Location</label>
                    <input type="text" id="location" name="location" class="form-control">
                </div>
                <div class="mb-4">
                    <label class="form-label fw-semibold">Company Description</label>
                    <textarea id="description" name="description" class="form-control" rows="3"></textarea>
                </div>
            </div>

            <button type="submit" class="btn btn-success btn-signup w-100">
                Create Account
            </button>

        </form>

        <hr>

        <div class="text-center">
            Already have an account?
            <br><br>
            <a href="/login" class="btn btn-primary">
                Login
            </a>
        </div>
    </div>
</div>

<script>
    function toggleCompanyFields() {
        var roleSelect = document.getElementById("roleSelect");
        var companyFields = document.getElementById("companyFields");
        var locationInput = document.getElementById("location");
        var descriptionInput = document.getElementById("description");

        if (roleSelect.value === "COMPANY") {
            companyFields.style.display = "block";
            locationInput.required = true;
            descriptionInput.required = true;
        } else {
            companyFields.style.display = "none";
            locationInput.required = false;
            descriptionInput.required = false;
        }
    }
</script>

</body>
</html>
