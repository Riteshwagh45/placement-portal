<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Signup</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow">

                <div class="card-body">

                    <h2 class="mb-4">Student Signup</h2>

                    <form th:action="@{/signup}"
                          th:object="${user}"
                          method="post">

                        <div class="mb-3">
                            <label>Username</label>
                            <input type="text"
                                   class="form-control"
                                   th:field="*{username}"
                                   required>
                        </div>

                        <div class="mb-3">
                            <label>Email</label>
                            <input type="email"
                                   class="form-control"
                                   th:field="*{email}"
                                   required>
                        </div>

                        <div class="mb-3">
                            <label>Password</label>
                            <input type="password"
                                   class="form-control"
                                   th:field="*{password}"
                                   required>
                        </div>

                        <button type="submit"
                                class="btn btn-success">
                            Signup
                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
