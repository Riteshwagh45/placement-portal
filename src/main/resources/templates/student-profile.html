<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Student Profile</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-body">

            <h2 class="mb-4">
                My Profile
            </h2>

            <div th:if="${param.success}"
                 class="alert alert-success">

                Profile Updated Successfully!

            </div>
            </div>

        <form th:action="@{/student-profile}"
              th:object="${student}"
              method="post"
              enctype="multipart/form-data">

                <input type="hidden"
                       th:field="*{id}">

                <div class="mb-3">

                    <label>Name</label>

                    <input type="text"
                           th:field="*{name}"
                           class="form-control">

                </div>

                <div class="mb-3">

                    <label>Email</label>

                    <input type="email"
                           th:field="*{email}"
                           class="form-control"
                           readonly>

                </div>

                <div class="mb-3">

                    <label>Phone</label>

                    <input type="text"
                           th:field="*{phone}"
                           class="form-control">

                </div>

                <div class="mb-3">

                    <label>Address</label>

                    <input type="text"
                           th:field="*{address}"
                           class="form-control">

                </div>

                <div class="mb-3">

                    <label>Skills</label>

                    <input type="text"
                           th:field="*{skills}"
                           class="form-control">

                </div>

                <div class="mb-3">

                    <label>CGPA</label>

                    <input type="number"
                           step="0.01"
                           th:field="*{cgpa}"
                           class="form-control">

                </div>

                <div class="mb-3">

                    <label>Resume URL</label>

                    <input type="text"
                           th:field="*{resumeUrl}"
                           class="form-control">

                </div>
            <div class="mb-3">

                <label>Upload Resume (PDF)</label>

                <input type="file"
                       name="resumeFile"
                       class="form-control"
                       accept=".pdf">

            </div>

                <button type="submit"
                        class="btn btn-primary">
                    Update Profile
                </button>

            </form>

        </div>

    </div>

</div>

</body>
</html>
