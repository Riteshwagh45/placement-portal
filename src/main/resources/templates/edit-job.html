<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Job</title>

    <meta charset="UTF-8">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap"
          rel="stylesheet">

    <style>
        body{
            font-family:'Poppins',sans-serif;
            background:#f5f7fb;
        }

        .card{
            border:none;
            border-radius:15px;
        }
    </style>

</head>

<body>

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-8">

            <div class="card shadow">

                <div class="card-body">

                    <h2 class="mb-4">
                        Edit Job
                    </h2>

                    <form th:action="@{/jobs/update}"
                          th:object="${job}"
                          method="post">

                        <input type="hidden"
                               th:field="*{id}">

                        <div class="mb-3">

                            <label class="form-label">
                                Job Title
                            </label>

                            <input type="text"
                                   class="form-control"
                                   th:field="*{title}"
                                   required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Description
                            </label>

                            <textarea class="form-control"
                                      rows="4"
                                      th:field="*{description}"
                                      required></textarea>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Salary
                            </label>

                            <input type="number"
                                   class="form-control"
                                   th:field="*{salary}"
                                   required>

                        </div>

                        <button type="submit"
                                class="btn btn-primary">
                            Update Job
                        </button>

                        <a href="/jobs"
                           class="btn btn-secondary">
                            Cancel
                        </a>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
