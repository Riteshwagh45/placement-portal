<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Placement Portal Login</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <style>

        *{
            font-family:'Poppins',sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#f5f7fb;
            padding:20px;
        }

        .login-card{
            width:100%;
            max-width:450px;
            border:none;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,0.1);
        }

        .card-body{
            padding:35px;
        }

        .portal-title{
            font-weight:700;
            color:#0f172a;
            margin-bottom:25px;
        }

        .form-control,
        .form-select{
            height:50px;
            border-radius:10px;
        }

        .btn-login{
            height:50px;
            border-radius:10px;
            font-weight:600;
        }

        .btn-signup{
            border-radius:10px;
            padding:10px 20px;
        }

        @media(max-width:576px){

            .card-body{
                padding:25px;
            }

            .portal-title{
                font-size:26px;
            }

        }

    </style>

</head>

<body>

<div class="card login-card">

    <div class="card-body">

        <h2 class="text-center portal-title">
            Placement Portal Login
        </h2>

        <div th:if="${error}"
             class="alert alert-danger"
             th:text="${error}">
        </div>

        <form th:action="@{/login}" method="post">

            <!-- Email -->

            <div class="mb-3">

                <label class="form-label fw-semibold">
                    Email
                </label>

                <input type="email"
                       name="email"
                       class="form-control"
                       placeholder="Enter your email"
                       required>

            </div>

            <!-- Password -->

            <div class="mb-3">

                <label class="form-label fw-semibold">
                    Password
                </label>

                <input type="password"
                       name="password"
                       class="form-control"
                       placeholder="Enter your password"
                       required>

            </div>

            <!-- Role -->

            <div class="mb-4">

                <label class="form-label fw-semibold">
                    Role
                </label>

                <select name="role"
                        class="form-select"
                        required>

                    <option value="">
                        Select Role
                    </option>

                    <option value="ADMIN">
                        Admin
                    </option>

                    <option value="STUDENT">
                        Student
                    </option>

                    <option value="COMPANY">
                        Company
                    </option>

                </select>

            </div>

            <button type="submit"
                    class="btn btn-primary btn-login w-100">
                Login
            </button>

        </form>

        <hr>

        <div class="text-center">

            <p class="mb-2">
                Don't have an account?
            </p>

            <a href="/signup"
               class="btn btn-success btn-signup">
                Sign Up
            </a>

        </div>

    </div>

</div>

</body>

</html>
