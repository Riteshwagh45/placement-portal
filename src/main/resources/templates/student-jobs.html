<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Available Jobs</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
        <h2>Available Jobs</h2>
        <a href="/student-dashboard" class="btn btn-dark">Back</a>
    </div>

    <div class="mb-4">
        <form th:action="@{/student-jobs}" method="get" class="d-flex gap-2">
            <input type="text" name="keyword" th:value="${keyword}" class="form-control" placeholder="Search by title, company or location...">
            <button type="submit" class="btn btn-primary">Search</button>
            <a th:href="@{/student-jobs}" class="btn btn-secondary">Clear</a>
        </form>
    </div>

    <div th:if="${message}" class="alert alert-warning">
        <span th:text="${message}"></span>
    </div>

    <div class="card shadow">
        <div class="card-body">
            <table class="table table-bordered">
                <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Title</th>
                    <th>Description</th>
                    <th>Salary</th>
                    <th>Action</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="job : ${jobs}">
                    <td th:text="${job.id}"></td>
                    <td th:text="${job.title}"></td>
                    <td th:text="${job.description}"></td>
                    <td th:text="${job.salary}"></td>
                    <td>
                        <div class="d-flex gap-2">
                            <a th:href="@{'/apply-job/' + ${job.id}}" class="btn btn-success btn-sm">Quick Apply</a>
                            <a th:href="@{'/manual-apply/' + ${job.id}}" class="btn btn-primary btn-sm">Apply with Resume</a>
                        </div>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(jobs)}">
                    <td colspan="5" class="text-center text-muted py-4">No available jobs match your criteria.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

</body>
</html>
