<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Placement Portal Dashboard</title>

    <meta charset="UTF-8">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <style>

        *{
            font-family:'Poppins',sans-serif;
        }

        body{
            background:#f5f7fb;
            margin:0;
            padding:0;
        }

        .navbar{
            background:#0f172a;
            height:70px;
            z-index:1000;
        }

        .sidebar{
            height:100vh;
            background:#111827;
            color:white;
            position:fixed;
            width:250px;
            left:0;
            top:70px; /* navbar khali start */
            padding-top:20px;
        }

        .sidebar a{
            color:white;
            text-decoration:none;
            display:block;
            padding:15px 25px;
            transition:0.3s;
        }

        .sidebar a:hover{
            background:#1e293b;
            padding-left:35px;
        }

        .main{
            margin-left:250px;
            margin-top:70px;   /* navbar sathi space */
            padding:30px;
        }

        .card-box{
            border:none;
            border-radius:20px;
            transition:0.3s;
            box-shadow:0 5px 15px rgba(0,0,0,0.08);
        }

        .card-box:hover{
            transform:translateY(-8px);
        }

        .icon{
            font-size:50px;
        }

        .count{
            font-size:42px;
            font-weight:700;
            margin-top:10px;
            margin-bottom:5px;
        }

    </style>
</head>

<body>

<nav class="navbar navbar-dark fixed-top">
    <div class="container-fluid">
        <span class="navbar-brand fw-bold">
            Placement Portal Dashboard
        </span>
    </div>
</nav>

<div class="sidebar">

    <a href="/students">
        <i class="bi bi-mortarboard-fill"></i>
        Students
    </a>

    <a href="/companies">
        <i class="bi bi-building"></i>
        Companies
    </a>

    <a href="/jobs">
        <i class="bi bi-briefcase-fill"></i>
        Jobs
    </a>

    <a href="/applications">
        <i class="bi bi-file-earmark-check-fill"></i>
        Applications
    </a>

</div>

<div class="main">

    <h2 class="mb-4 fw-bold">
        Admin DashBoard
    </h2>

    <div class="row g-4">

        <!-- Students -->

        <div class="col-md-3">

            <a href="/students" style="text-decoration:none;">

                <div class="card card-box bg-primary text-white p-4">

                    <i class="bi bi-mortarboard-fill icon"></i>

                    <h4 class="mt-3">Students</h4>

                    <div class="count"
                         th:text="${studentCount}">
                        0
                    </div>

                    <p>Total Students</p>

                </div>

            </a>

        </div>

        <!-- Companies -->

        <div class="col-md-3">

            <a href="/companies" style="text-decoration:none;">

                <div class="card card-box bg-success text-white p-4">

                    <i class="bi bi-building icon"></i>

                    <h4 class="mt-3">Companies</h4>

                    <div class="count"
                         th:text="${companyCount}">
                        0
                    </div>

                    <p>Total Companies</p>

                </div>

            </a>

        </div>

        <!-- Jobs -->

        <div class="col-md-3">

            <a href="/jobs" style="text-decoration:none;">

                <div class="card card-box bg-warning text-dark p-4">

                    <i class="bi bi-briefcase-fill icon"></i>

                    <h4 class="mt-3">Jobs</h4>

                    <div class="count"
                         th:text="${jobCount}">
                        0
                    </div>

                    <p>Total Jobs</p>

                </div>

            </a>

        </div>

        <!-- Applications -->

        <div class="col-md-3">

            <a href="/applications" style="text-decoration:none;">

                <div class="card card-box bg-danger text-white p-4">

                    <i class="bi bi-file-earmark-check-fill icon"></i>

                    <h4 class="mt-3">Applications</h4>

                    <div class="count"
                         th:text="${applicationCount}">
                        0
                    </div>

                    <p>Total Applications</p>

                </div>

            </a>

        </div>

    </div>

</div>

</body>
</html>
