<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Student</title>

    <meta charset="UTF-8">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap"
          rel="stylesheet">

    <style>

        body{
            background:#f5f7fb;
            font-family:'Poppins',sans-serif;
        }

        .card{
            border:none;
            border-radius:15px;
        }

    </style>

</head>

<body>

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-8">

            <div class="card shadow">

                <div class="card-body p-4">

                    <h2 class="mb-4">
                        Edit Student
                    </h2>

                    <form th:action="@{/students/update}"
                          th:object="${student}"
                          method="post">

                        <input type="hidden"
                               th:field="*{id}">

                        <div class="mb-3">

                            <label class="form-label">
                                Name
                            </label>

                            <input type="text"
                                   class="form-control"
                                   th:field="*{name}"
                                   required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Email
                            </label>

                            <input type="email"
                                   class="form-control"
                                   th:field="*{email}"
                                   required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Skills
                            </label>

                            <input type="text"
                                   class="form-control"
                                   th:field="*{skills}">

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                CGPA
                            </label>

                            <input type="number"
                                   step="0.01"
                                   class="form-control"
                                   th:field="*{cgpa}">

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Resume URL
                            </label>

                            <input type="text"
                                   class="form-control"
                                   th:field="*{resumeUrl}">

                        </div>

                        <button type="submit"
                                class="btn btn-primary">

                            Update Student

                        </button>

                        <a href="/students"
                           class="btn btn-secondary">

                            Cancel

                        </a>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
