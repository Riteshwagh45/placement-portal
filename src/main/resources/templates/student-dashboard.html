<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Student Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-body text-center">

            <div class="mb-3">

                <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png"
                     width="120">

            </div>

            <h2 th:text="${student.name}">
                Student Name
            </h2>

            <p class="text-muted"
               th:text="${student.email}">
                Email
            </p>

            <hr>

            <div class="row">

                <div class="col-md-6">

                    <h5>Phone</h5>

                    <p th:text="${student.phone}">
                    </p>

                </div>

                <div class="col-md-6">

                    <h5>CGPA</h5>

                    <p th:text="${student.cgpa}">
                    </p>

                </div>

            </div>

            <div class="mt-3">

                <h5>Skills</h5>

                <p th:text="${student.skills}">
                </p>

            </div>

            <div class="mt-3">

                <h5>Address</h5>

                <p th:text="${student.address}">
                </p>

            </div>

            <!-- Notifications -->

            <div th:if="${applications != null}"
                 class="mt-4">

                <h4 class="mb-3">
                    Notifications
                </h4>

                <div th:each="app : ${applications}">

                    <div th:if="${app.status == 'SHORTLISTED'}"
                         class="alert alert-warning">

                        🎉 Congratulations!
                        You have been shortlisted.

                    </div>

                    <div th:if="${app.status == 'SELECTED'}"
                         class="alert alert-success">

                        ✅ Congratulations!
                        You have been selected.

                    </div>

                    <div th:if="${app.status == 'REJECTED'}"
                         class="alert alert-danger">

                        ❌ Application not selected.

                    </div>

                </div>

            </div>

            <div class="mt-4">

                <a href="/student-jobs"
                   class="btn btn-primary">
                    View Jobs
                </a>

                <a href="/student-profile"
                   class="btn btn-success">
                    Edit Profile
                </a>

                <a href="/my-applications"
                   class="btn btn-info">
                    My Applications
                </a>

                <a href="/logout"
                   class="btn btn-danger">
                    Logout
                </a>

            </div>

        </div>

    </div>

</div>

</body>
</html>
