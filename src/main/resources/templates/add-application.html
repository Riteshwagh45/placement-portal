<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Application</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-body">

            <h2>Add Application</h2>

            <form th:action="@{/applications/save}"
                  th:object="${application}"
                  method="post">

                <div class="mb-3">
                    <label>Student ID</label>
                    <input type="number"
                           class="form-control"
                           th:field="*{studentId}"
                           required>
                </div>

                <div class="mb-3">
                    <label>Job ID</label>
                    <input type="number"
                           class="form-control"
                           th:field="*{jobId}"
                           required>
                </div>

                <div class="mb-3">
                    <label>Status</label>

                    <select class="form-control"
                            th:field="*{status}">

                        <option value="Applied">
                            Applied
                        </option>

                        <option value="Shortlisted">
                            Shortlisted
                        </option>

                        <option value="Selected">
                            Selected
                        </option>

                        <option value="Rejected">
                            Rejected
                        </option>

                    </select>

                </div>

                <button class="btn btn-success">
                    Save
                </button>

            </form>

        </div>

    </div>

</div>

</body>
</html>
